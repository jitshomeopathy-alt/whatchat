<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Blog — Astro Vaidhya</title>
    <meta
      name="description"
      content="Evidence-informed wellness articles from Astro Vaidhya — sexual health, skin & hair, weight loss, stress & sleep, PCOS, diabetes, gut health and more."
    />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://astrovaidhya.com/blog" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Astro Vaidhya" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:url" content="https://astrovaidhya.com/blog" />
    <meta property="og:title" content="Health Blog — Astro Vaidhya" />
    <meta property="og:description" content="Evidence-informed wellness articles across skin, hair, weight, stress, PCOS, diabetes, gut health and more." />
    <meta property="og:image" content="https://astrovaidhya.com/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Health Blog — Astro Vaidhya" />
    <meta name="twitter:description" content="Evidence-informed wellness articles from Astro Vaidhya." />
    <meta name="twitter:image" content="https://astrovaidhya.com/og-image.png" />

    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b0e1a'/%3E%3Ctext x='32' y='44' font-size='38' text-anchor='middle' fill='%23c99a4b' font-family='Georgia,serif'%3EA%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&amp;family=Inter:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/site.css" />
    <style>
      .blog-head { max-width: 1100px; margin: 0 auto; padding: 46px 22px 8px; }
      .blog-head h1 { font-family: 'Fraunces', Georgia, serif; font-size: clamp(2rem, 4vw, 2.8rem); margin: 0 0 10px; }
      .blog-head p { color: var(--muted, #6f7680); max-width: 620px; margin: 0; }

      .blog-filters { display: flex; flex-wrap: wrap; gap: 8px; max-width: 1100px; margin: 22px auto 0; padding: 0 22px; }
      .chip {
        border: 1px solid var(--hairline, rgba(201, 154, 75, 0.3)); background: #fff;
        color: var(--ink, #25303a); padding: 7px 15px; border-radius: 999px;
        font-size: 0.86rem; cursor: pointer; transition: all .15s ease;
      }
      .chip:hover { border-color: var(--brass, #c99a4b); }
      .chip.active { background: var(--brass, #c99a4b); color: #fff; border-color: var(--brass, #c99a4b); }

      .blog-grid {
        max-width: 1100px; margin: 26px auto 70px; padding: 0 22px;
        display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;
      }
      .post {
        background: #fff; border: 1px solid var(--hairline, rgba(201, 154, 75, 0.22));
        border-radius: 16px; overflow: hidden; display: flex; flex-direction: column;
        text-decoration: none; color: inherit; transition: transform .15s ease, box-shadow .15s ease;
      }
      .post:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(11, 14, 26, 0.1); }
      .post-thumb { width: 100%; height: 180px; object-fit: cover; background: rgba(201, 154, 75, 0.12); }
      .post-thumb.placeholder { display: flex; align-items: center; justify-content: center; font-size: 38px; }
      .post-body { padding: 18px 20px 22px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
      .post-cat { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--brass, #c99a4b); }
      .post-title { font-family: 'Fraunces', Georgia, serif; font-size: 1.25rem; line-height: 1.3; margin: 0; }
      .post-desc { color: var(--muted, #6f7680); font-size: 0.92rem; line-height: 1.55; }
      .post-date { margin-top: auto; color: var(--muted, #9aa0a6); font-size: 0.8rem; }

      .state { max-width: 1100px; margin: 40px auto; padding: 0 22px; color: var(--muted, #6f7680); text-align: center; }
    </style>
  </head>
  <body>
    <nav class="nav"></nav>

    <header class="blog-head">
      <h1>Health Blog</h1>
      <p>Practical, evidence-informed guidance on the things people actually ask us about — from skin and hair to sleep, hormones and gut health.</p>
    </header>

    <div class="blog-filters" id="filters"></div>

    <div class="blog-grid" id="grid">
      <div class="state">Loading articles…</div>
    </div>

    <footer class="site-footer">
      <div class="footer-row">
        <span>&copy; 2026 Astro Vaidhya.</span>
        <div class="footer-links">
          <a href="/about">About</a><a href="/contact">Contact</a>
          <a href="/privacy">Privacy Policy</a><a href="/terms">Terms of Service</a>
        </div>
      </div>
    </footer>

    <script src="/site-nav.js" defer></script>
    <script>
      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => (
          { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
        ));
      }
      function fmtDate(d) {
        if (!d) return '';
        try { return new Date(d).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' }); }
        catch (e) { return ''; }
      }

      const grid = document.getElementById('grid');
      const filtersEl = document.getElementById('filters');
      let activeCategory = '';

      function renderFilters(categories) {
        const chips = ['<button class="chip' + (activeCategory ? '' : ' active') + '" data-cat="">All</button>']
          .concat(categories.map((c) =>
            '<button class="chip' + (activeCategory === c ? ' active' : '') + '" data-cat="' + esc(c) + '">' + esc(c) + '</button>'));
        filtersEl.innerHTML = chips.join('');
        filtersEl.querySelectorAll('.chip').forEach((b) =>
          b.addEventListener('click', () => { activeCategory = b.dataset.cat; load(); }));
      }

      function renderPosts(posts) {
        if (!posts.length) {
          grid.innerHTML = '<div class="state">No articles here yet. Check back soon.</div>';
          return;
        }
        grid.innerHTML = posts.map((p) => `
          <a class="post" href="/blog/${esc(p.slug)}">
            ${p.thumbnailUrl
              ? `<img class="post-thumb" src="${esc(p.thumbnailUrl)}" alt="${esc(p.title)}" loading="lazy" />`
              : `<div class="post-thumb placeholder">📝</div>`}
            <div class="post-body">
              <div class="post-cat">${esc(p.category)}</div>
              <h2 class="post-title">${esc(p.title)}</h2>
              <div class="post-desc">${esc((p.description || '').slice(0, 140))}</div>
              <div class="post-date">${esc(fmtDate(p.publishedAt || p.createdAt))}</div>
            </div>
          </a>`).join('');
      }

      async function load() {
        grid.innerHTML = '<div class="state">Loading articles…</div>';
        let res;
        try {
          const q = activeCategory ? ('?category=' + encodeURIComponent(activeCategory)) : '';
          res = await fetch('/api/articles' + q, { cache: 'no-store' });
        } catch (e) {
          grid.innerHTML = '<div class="state">Could not load articles. Please retry.</div>';
          return;
        }
        if (!res.ok) { grid.innerHTML = '<div class="state">Could not load articles.</div>'; return; }
        const data = await res.json();
        if (data.categories) renderFilters(data.categories);
        renderPosts(data.data || []);
      }

      load();
    </script>
  </body>
</html>
