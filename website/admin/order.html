<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order · WhatChat Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <style>
    .order-grid { display: grid; grid-template-columns: 1fr 320px; gap: 22px; align-items: start; }
    @media (max-width: 820px) { .order-grid { grid-template-columns: 1fr; } }
    .panel { padding: 22px; }
    .panel h2 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
    .line { display: flex; gap: 12px; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .line:last-child { border-bottom: none; }
    .line img { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); background: var(--bg); }
    .line .ph { width: 48px; height: 48px; border-radius: 8px; display: grid; place-items: center; background: var(--bg); color: var(--muted); }
    .line .ln { flex: 1; }
    .line .lname { font-weight: 600; font-size: 14px; }
    .line .lqty { color: var(--muted); font-size: 13px; }
    .totals { display: flex; justify-content: space-between; padding-top: 14px; font-weight: 700; font-size: 16px; }
    .kv { margin-bottom: 12px; }
    .kv .k { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 700; }
    .kv .v { font-size: 14px; margin-top: 3px; word-break: break-word; }
    .status-row { display: flex; gap: 10px; margin-top: 10px; }
    .status-row select { flex: 1; padding: 10px 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; }
    .status-row .btn { width: auto; margin: 0; padding: 10px 16px; }
    .badge.blue { background: #e4eefb; color: #2563c9; }
    .badge.red { background: #fdecec; color: var(--danger); }
    .badge.purple { background: #efe7fb; color: #6b3fc9; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><span class="dot">💬</span> WhatChat</div>
      <a href="/admin" class="nav-item"><span class="ico">👥</span> Users</a>
      <a href="/admin/messages" class="nav-item"><span class="ico">✉️</span> Send Message</a>
      <a href="/admin/stories" class="nav-item"><span class="ico">⭐</span> Success Stories</a>
      <a href="/admin/products" class="nav-item"><span class="ico">📦</span> Products</a>
      <a href="/admin/orders" class="nav-item active"><span class="ico">🧾</span> Orders</a>
      <div class="spacer"></div>
      <div class="nav-item signout" id="signout"><span class="ico">↩︎</span> Sign out</div>
    </aside>

    <div class="main">
      <header class="header">
        <h1>Order detail</h1>
        <div class="who"><span>Administrator</span><div class="avatar">A</div></div>
      </header>

      <div class="content">
        <a href="/admin/orders" class="back-link">← Back to orders</a>
        <div id="body"><div class="loading">Loading order…</div></div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('wc_admin_token');
    if (!token) location.replace('/admin/login');
    document.getElementById('signout').addEventListener('click', () => {
      localStorage.removeItem('wc_admin_token'); location.replace('/admin/login');
    });

    const orderId = new URLSearchParams(location.search).get('id');
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
    function authHeaders(extra) { return Object.assign({ Authorization: 'Bearer ' + token }, extra || {}); }
    function handleAuth(res) {
      if (res.status === 401 || res.status === 403) { localStorage.removeItem('wc_admin_token'); location.replace('/admin/login'); return true; }
      return false;
    }
    function inr(n) { return '₹' + Number(n).toLocaleString('en-IN'); }
    function fmtDate(d) { return new Date(d).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' }); }
    const STATUSES = ['pending', 'paid', 'processing', 'shipped', 'delivered', 'cancelled'];

    async function load() {
      const body = document.getElementById('body');
      const res = await fetch('/admin/orders/' + orderId, { headers: authHeaders(), cache: 'no-store' });
      if (handleAuth(res)) return;
      if (!res.ok) { body.innerHTML = '<div class="empty">Order not found.</div>'; return; }
      const { order } = await res.json();
      const c = order.customerId || {};
      const a = order.shippingAddress || {};
      const addrLines = [a.line1, a.line2, [a.city, a.state].filter(Boolean).join(', '), a.pincode].filter(Boolean);

      body.innerHTML = `
        <div class="order-grid">
          <div class="card panel">
            <h2>Items · Order #${String(order._id).slice(-6)}</h2>
            ${(order.items || []).map((it) => `
              <div class="line">
                ${it.imageUrl ? `<img src="${esc(it.imageUrl)}" alt="" />` : '<div class="ph">📦</div>'}
                <div class="ln">
                  <div class="lname">${esc(it.name)}</div>
                  <div class="lqty">${inr(it.price)} × ${it.quantity}</div>
                </div>
                <div>${inr(it.price * it.quantity)}</div>
              </div>`).join('')}
            <div class="totals"><span>Total</span><span>${inr(order.total)}</span></div>
          </div>

          <div class="card panel">
            <h2>Summary</h2>
            <div class="kv"><div class="k">Placed</div><div class="v">${fmtDate(order.createdAt)}</div></div>
            <div class="kv"><div class="k">Payment</div><div class="v">${esc(order.payment?.status || '—')}${order.payment?.paymentId ? ' · ' + esc(order.payment.paymentId) : ''}</div></div>
            <div class="kv"><div class="k">Customer</div><div class="v">${esc(c.name || '—')}<br>${esc(c.email || '')}<br>${esc(c.phone || '')}</div></div>
            <div class="kv"><div class="k">Ship to</div><div class="v">${esc(a.name || '')}${a.phone ? '<br>' + esc(a.phone) : ''}${addrLines.length ? '<br>' + addrLines.map(esc).join('<br>') : '<br><span class="muted">No address provided</span>'}</div></div>
            <div class="kv">
              <div class="k">Status</div>
              <div class="status-row">
                <select id="statusSel">${STATUSES.map((s) => `<option value="${s}" ${s === order.status ? 'selected' : ''}>${s}</option>`).join('')}</select>
                <button class="btn" id="updateBtn">Update</button>
              </div>
              <div class="error-msg" id="statusErr" style="margin-top:10px"></div>
            </div>
          </div>
        </div>`;

      document.getElementById('updateBtn').addEventListener('click', updateStatus);
    }

    async function updateStatus() {
      const sel = document.getElementById('statusSel');
      const err = document.getElementById('statusErr');
      err.classList.remove('show');
      const btn = document.getElementById('updateBtn');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const res = await fetch('/admin/orders/' + orderId + '/status', {
          method: 'PUT', headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ status: sel.value }),
        });
        if (handleAuth(res)) return;
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Update failed');
        load();
      } catch (e) {
        err.textContent = e.message; err.classList.add('show');
      } finally {
        btn.disabled = false; btn.textContent = 'Update';
      }
    }

    load();
  </script>
  <script src="/admin/admin-nav.js" defer></script>
</body>
</html>
