<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Success Stories · WhatChat Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/admin/admin.css" />
  <style>
    .toolbar { display: flex; justify-content: flex-end; margin-bottom: 18px; }
    .btn-inline { width: auto; margin: 0; padding: 10px 18px; text-decoration: none; }

    .story-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; }
    .story-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 18px; display: flex; flex-direction: column; gap: 12px;
    }
    .story-top { display: flex; align-items: center; gap: 12px; }
    .story-pic {
      width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
      background: var(--green-light); flex: none;
      display: flex; align-items: center; justify-content: center;
      color: var(--green-dark); font-weight: 700; font-size: 20px;
    }
    .story-name { font-weight: 700; font-size: 15px; }
    .stars { color: #f2b01e; font-size: 15px; letter-spacing: 1px; }
    .stars .off { color: #d7dce0; }
    .story-rating-num { color: var(--muted); font-size: 12px; font-weight: 600; }
    .story-desc { color: var(--text-light); font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .story-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: auto; }
    .story-actions { display: flex; gap: 8px; }
    .btn-sm { width: auto; margin: 0; padding: 7px 14px; font-size: 13px; text-decoration: none; }
    .btn-danger { background: var(--danger); }
    .btn-danger:hover { background: #c42f2f; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="brand"><span class="dot">💬</span> WhatChat</div>
      <a href="/admin" class="nav-item"><span class="ico">👥</span> Users</a>
      <a href="/admin/messages" class="nav-item"><span class="ico">✉️</span> Send Message</a>
      <a href="/admin/stories" class="nav-item active"><span class="ico">⭐</span> Success Stories</a>
      <a href="/admin/products" class="nav-item"><span class="ico">📦</span> Products</a>
      <a href="/admin/orders" class="nav-item"><span class="ico">🧾</span> Orders</a>
      <div class="spacer"></div>
      <div class="nav-item signout" id="signout"><span class="ico">↩︎</span> Sign out</div>
    </aside>

    <div class="main">
      <header class="header">
        <h1>Success Stories</h1>
        <div class="who">
          <span>Administrator</span>
          <div class="avatar">A</div>
        </div>
      </header>

      <div class="content">
        <div class="toolbar">
          <a class="btn btn-inline" href="/admin/story-edit">＋ Add story</a>
        </div>
        <div id="grid">
          <div class="loading">Loading stories…</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('wc_admin_token');
    if (!token) location.replace('/admin/login');

    document.getElementById('signout').addEventListener('click', () => {
      localStorage.removeItem('wc_admin_token');
      location.replace('/admin/login');
    });

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, (c) => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
      ));
    }
    function authHeaders(extra) {
      return Object.assign({ Authorization: 'Bearer ' + token }, extra || {});
    }
    function handleAuth(res) {
      if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('wc_admin_token');
        location.replace('/admin/login');
        return true;
      }
      return false;
    }
    function starsHtml(rating) {
      let out = '';
      for (let i = 1; i <= 10; i++) {
        out += i <= rating ? '★' : '<span class="off">★</span>';
      }
      return out;
    }
    function initials(name) {
      return String(name || '?').trim().charAt(0).toUpperCase() || '?';
    }

    let stories = [];

    async function load() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '<div class="loading">Loading stories…</div>';
      let res;
      try {
        res = await fetch('/admin/stories', { headers: authHeaders(), cache: 'no-store' });
      } catch (e) {
        grid.innerHTML = '<div class="empty">Network error. Please retry.</div>';
        return;
      }
      if (handleAuth(res)) return;
      if (!res.ok) { grid.innerHTML = '<div class="empty">Failed to load stories.</div>'; return; }
      const data = await res.json();
      stories = data.data || [];
      render();
    }

    function render() {
      const grid = document.getElementById('grid');
      if (!stories.length) {
        grid.innerHTML = '<div class="empty">No stories yet. Click “Add story” to create the first one.</div>';
        return;
      }
      grid.innerHTML = '<div class="story-grid">' + stories.map((s) => `
        <div class="story-card">
          <div class="story-top">
            ${s.photoUrl
              ? `<img class="story-pic" src="${esc(s.photoUrl)}" alt="${esc(s.name)}" />`
              : `<div class="story-pic">${esc(initials(s.name))}</div>`}
            <div>
              <div class="story-name">${esc(s.name)} ${s.published ? '' : '<span class="badge gray">Hidden</span>'}</div>
              <div class="stars">${starsHtml(s.rating)} <span class="story-rating-num">${s.rating}/10</span></div>
            </div>
          </div>
          <div class="story-desc">${esc(s.description)}</div>
          <div class="story-foot">
            <span></span>
            <div class="story-actions">
              <a class="btn btn-ghost btn-sm" href="/admin/story-edit?id=${s._id}">Edit</a>
              <button class="btn btn-danger btn-sm" data-del="${s._id}">Delete</button>
            </div>
          </div>
        </div>`).join('') + '</div>';

      grid.querySelectorAll('[data-del]').forEach((b) =>
        b.addEventListener('click', () => remove(b.dataset.del)));
    }

    async function remove(id) {
      const s = stories.find((x) => x._id === id);
      if (!confirm(`Delete the story from “${s ? s.name : 'this user'}”? This cannot be undone.`)) return;
      const res = await fetch('/admin/stories/' + id, { method: 'DELETE', headers: authHeaders() });
      if (handleAuth(res)) return;
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        alert(data.error || 'Delete failed');
        return;
      }
      load();
    }

    load();
  </script>
</body>
</html>
