<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product — Astro Vaidhya</title>
    <meta name="robots" content="index, follow" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b0e1a'/%3E%3Ctext x='32' y='44' font-size='38' text-anchor='middle' fill='%23c99a4b' font-family='Georgia,serif'%3EA%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&amp;family=Inter:wght@400;500;600;700&amp;family=IBM+Plex+Mono:wght@400;500&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/site.css" />
    <link rel="stylesheet" href="/shop.css" />
  </head>
  <body>
    <nav class="nav">
      <div class="wrap nav-row">
        <a class="brand" href="/">
          <svg class="brand-mark" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="20" cy="20" r="17" fill="none" stroke="#c99a4b" stroke-width="1" opacity="0.55" />
            <g stroke="#e8c57e" stroke-width="1.4" stroke-linecap="round">
              <line x1="20" y1="20" x2="20" y2="6" /><line x1="20" y1="20" x2="31.3" y2="13" />
              <line x1="20" y1="20" x2="31.3" y2="27" /><line x1="20" y1="20" x2="20" y2="34" />
              <line x1="20" y1="20" x2="8.7" y2="27" /><line x1="20" y1="20" x2="8.7" y2="13" />
            </g>
            <circle cx="20" cy="20" r="3.4" fill="#e8c57e" />
          </svg>
          <span class="brand-text"><span class="brand-word">Astro&nbsp;Vaidhya</span><span class="brand-tag">AI Homeopathic Wellness</span></span>
        </a>
        <div class="nav-links">
          <a href="/">Home</a>
          <a href="/shop">Shop</a>
          <a href="/about">About</a>
          <a href="/contact">Contact</a>
          <span id="navAuth"></span>
        </div>
      </div>
    </nav>

    <main class="shop-page">
      <p style="margin-bottom:20px"><a href="/shop" style="color:var(--brass)">← Back to shop</a></p>
      <div id="body"><div class="loading-state">Loading…</div></div>
    </main>

    <footer class="site-footer">
      <div class="footer-row">
        <span>&copy; 2026 Astro Vaidhya.</span>
        <div class="footer-links">
          <a href="/about">About</a><a href="/contact">Contact</a>
          <a href="/privacy">Privacy Policy</a><a href="/terms">Terms of Service</a>
        </div>
      </div>
    </footer>

    <script src="/storefront.js"></script>
    <script>
      const id = new URLSearchParams(location.search).get('id');
      const STOCK = {
        in_stock: ['In stock', 'stock-in'],
        few_left: ['Few left', 'stock-few'],
        sold_out: ['Sold out', 'stock-out'],
      };

      async function load() {
        const body = document.getElementById('body');
        if (!id) { body.innerHTML = '<div class="empty-state">Product not found.</div>'; return; }
        let product;
        try {
          const res = await fetch('/api/shop/products/' + id, { cache: 'no-store' });
          if (!res.ok) throw new Error();
          product = (await res.json()).product;
        } catch (e) {
          body.innerHTML = '<div class="empty-state">Product not found.</div>';
          return;
        }
        document.title = product.name + ' — Astro Vaidhya';
        const [label, cls] = STOCK[product.status] || STOCK.in_stock;
        body.innerHTML = `
          <div class="product-detail">
            <div class="media">${product.imageUrl ? `<img src="${Store.esc(product.imageUrl)}" alt="${Store.esc(product.name)}" />` : '<span class="ph">🌿</span>'}</div>
            <div>
              <span class="product-cat">${Store.esc(product.category)}</span>
              <h1>${Store.esc(product.name)}</h1>
              <span class="stock-tag ${cls}">${label}</span>
              <div class="price-lg">${Store.inr(product.price)}</div>
              ${product.description ? `<div class="desc">${Store.esc(product.description)}</div>` : ''}
              ${product.available ? `
                <div class="qty-row">
                  <label for="qty">Quantity</label>
                  <input type="number" id="qty" value="1" min="1" style="width:88px;padding:10px 12px;border:1px solid var(--hairline);border-radius:6px" />
                </div>
                <button class="btn btn-dark" id="addBtn">Add to cart</button>
                <a class="btn btn-outline" id="buyBtn" style="margin-left:10px">Buy now</a>
              ` : '<p class="muted" style="margin-top:18px">Currently unavailable</p>'}
            </div>
          </div>`;

        if (product.available) {
          const qtyEl = document.getElementById('qty');
          const getQty = () => Math.max(1, parseInt(qtyEl.value, 10) || 1);
          document.getElementById('addBtn').addEventListener('click', () => {
            Store.addToCart(product, getQty());
            document.getElementById('addBtn').textContent = 'Added ✓';
            setTimeout(() => { document.getElementById('addBtn').textContent = 'Add to cart'; }, 1400);
          });
          document.getElementById('buyBtn').addEventListener('click', () => {
            Store.addToCart(product, getQty());
            location.href = '/cart';
          });
        }
      }
      load();
    </script>
  </body>
</html>
